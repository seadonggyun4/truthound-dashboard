name: Reusable Backend Ratchet

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: "3.11"
      retention-days:
        required: false
        type: number
        default: 7

permissions: read-all

jobs:
  backend-ratchet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Install backend dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run backend ratchet checks
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results
          mapfile -t ruff_targets < <(grep -vE '^\s*(#|$)' .github/ci/backend-ruff-ratchet.txt)
          mapfile -t mypy_targets < <(grep -vE '^\s*(#|$)' .github/ci/backend-mypy-ratchet.txt)
          python -m ruff check "${ruff_targets[@]}" 2>&1 | tee test-results/backend-ratchet-ruff.log
          python -m mypy --follow-imports=skip --ignore-missing-imports "${mypy_targets[@]}" 2>&1 | tee test-results/backend-ratchet-mypy.log

      - name: Upload backend ratchet artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: backend-ratchet-results
          path: test-results
          if-no-files-found: error
          retention-days: ${{ inputs.retention-days }}

      - name: Write backend ratchet summary
        if: always()
        shell: bash
        env:
          PYTHON_VERSION: ${{ inputs.python-version }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          root = Path(".github/ci")
          ruff_targets = [
              line.strip()
              for line in (root / "backend-ruff-ratchet.txt").read_text(encoding="utf-8").splitlines()
              if line.strip() and not line.lstrip().startswith("#")
          ]
          mypy_targets = [
              line.strip()
              for line in (root / "backend-mypy-ratchet.txt").read_text(encoding="utf-8").splitlines()
              if line.strip() and not line.lstrip().startswith("#")
          ]

          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          with summary.open("a", encoding="utf-8") as handle:
              handle.write("### Backend Ratchet Summary\n")
              handle.write(f"- Python: `{os.environ['PYTHON_VERSION']}`\n")
              handle.write(f"- Ruff target count: `{len(ruff_targets)}`\n")
              handle.write(f"- Mypy target count: `{len(mypy_targets)}`\n")
              handle.write("- Ratchet intent: required clean subtree for artifact and secret core modules\n")
          PY
