name: Reusable Release Verification

on:
  workflow_call:
    inputs:
      retention-days:
        required: false
        type: number
        default: 30

permissions: read-all

jobs:
  release-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install release verification dependencies
        run: python -m pip install -e ".[docs,dev]" build

      - name: Build Python distributions
        run: python -m build

      - name: Install wheel in fresh environment
        shell: bash
        run: |
          set -euo pipefail
          python -m venv .venv_release_smoke
          source .venv_release_smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          truthound-dashboard --help

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Build production frontend
        working-directory: frontend
        run: npm run build

      - name: Build docs strictly
        run: python -m mkdocs build --strict

      - name: Upload release artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-verification-results
          path: |
            dist
            site
          if-no-files-found: warn
          retention-days: ${{ inputs.retention-days }}
