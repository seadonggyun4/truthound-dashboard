name: Docs

on:
  pull_request:
    paths:
      - "README.md"
      - "docs/**"
      - "mkdocs.yml"
      - "tests/test_docs_surface.py"
      - "pyproject.toml"
  push:
    branches: [main]
    paths:
      - "README.md"
      - "docs/**"
      - "mkdocs.yml"
      - "tests/test_docs_surface.py"
      - "pyproject.toml"

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install docs dependencies
        run: python -m pip install -e ".[docs,dev]"
      - name: Docs regression tests
        run: python -m pytest -q tests/test_docs_surface.py -p no:cacheprovider
      - name: MkDocs strict build
        run: python -m mkdocs build --strict
