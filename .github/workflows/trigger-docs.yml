name: Trigger Truthound Docs

on:
  push:
    branches: [main]
    paths:
      - "README.md"
      - "docs/**"
      - "mkdocs.yml"

jobs:
  verify-and-trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install docs dependencies
        run: python -m pip install -e ".[docs,dev]"
      - name: MkDocs strict build
        run: python -m mkdocs build --strict
      - name: Trigger main docs rebuild
        run: curl -X POST -d {} "${{ secrets.NETLIFY_DOCS_BUILD_HOOK }}"
