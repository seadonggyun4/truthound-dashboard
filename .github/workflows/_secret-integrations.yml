name: Reusable Secret Integrations

on:
  workflow_call:
    inputs:
      retention-days:
        required: false
        type: number
        default: 30
      integration-target:
        required: false
        type: string
        default: all

permissions: read-all

jobs:
  secret-integrations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
          cache: pip

      - name: Install integration dependencies
        run: python -m pip install -e ".[docs,dev]"

      - name: Run secret-backed integration smoke tests
        run: |
          mkdir -p test-results
          python -m pytest -q tests/test_ci_secret_integrations.py -p no:cacheprovider \
            --junitxml=test-results/secret-integrations-junit.xml
        env:
          CI_SECRET_INTEGRATION_TARGET: ${{ inputs.integration-target }}
          CI_SECRET_SMOKE_SOURCE_TYPE: ${{ secrets.CI_SECRET_SMOKE_SOURCE_TYPE }}
          CI_SECRET_SMOKE_SOURCE_CONFIG_JSON: ${{ secrets.CI_SECRET_SMOKE_SOURCE_CONFIG_JSON }}

      - name: Upload secret integration artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: secret-integrations-results
          path: test-results
          if-no-files-found: error
          retention-days: ${{ inputs.retention-days }}
