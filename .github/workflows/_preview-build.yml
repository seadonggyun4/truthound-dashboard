name: Reusable Preview Build

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: "3.11"
      node-version:
        required: false
        type: string
        default: "20"
      retention-days:
        required: false
        type: number
        default: 7

permissions: read-all

jobs:
  preview-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Run shared preview build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results
          bash ./scripts/build_preview.sh 2>&1 | tee test-results/preview-build.log

      - name: Upload preview build artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: preview-build-results
          path: test-results
          if-no-files-found: error
          retention-days: ${{ inputs.retention-days }}

      - name: Write preview build summary
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          static_index = Path("src/truthound_dashboard/static/index.html")
          summary = Path(__import__("os").environ["GITHUB_STEP_SUMMARY"])
          with summary.open("a", encoding="utf-8") as handle:
              handle.write("### Preview Build Summary\n")
              handle.write(f"- Python: `${{{{ inputs.python-version }}}}`\n")
              handle.write(f"- Node: `${{{{ inputs.node-version }}}}`\n")
              handle.write(f"- Static bundle present: `{'yes' if static_index.exists() else 'no'}`\n")
              handle.write("- Shared preview build script: `scripts/build_preview.sh`\n")
          PY
