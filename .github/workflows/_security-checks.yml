name: Reusable Security Checks

on:
  workflow_call:
    inputs:
      mode:
        required: true
        type: string
      retention-days:
        required: false
        type: number
        default: 7

permissions: read-all

jobs:
  preflight:
    if: inputs.mode == 'preflight'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417
        with:
          go-version: "1.22"

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.8

      - name: Run actionlint
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results
          "$(go env GOPATH)/bin/actionlint" 2>&1 | tee test-results/actionlint.log

      - name: Run dependency review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48

      - name: Upload preflight artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: preflight-results
          path: test-results
          if-no-files-found: error
          retention-days: ${{ inputs.retention-days }}

      - name: Write preflight summary
        if: always()
        run: |
          {
            echo "### Preflight Summary"
            echo "- actionlint: completed"
            echo "- dependency review: ${{ github.event_name == 'pull_request' && 'completed' || 'skipped' }}"
          } >> "$GITHUB_STEP_SUMMARY"

  audit:
    if: inputs.mode == 'audit'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install audit dependencies
        run: python -m pip install -e ".[dev]" pip-audit

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run pip audit
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results
          python -m pip_audit --progress-spinner off 2>&1 | tee test-results/pip-audit.log

      - name: Run npm audit
        shell: bash
        working-directory: frontend
        run: |
          set -euo pipefail
          mkdir -p test-results
          npm audit --omit=dev --audit-level=high 2>&1 | tee test-results/npm-audit.log

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: security-audit-results
          path: |
            test-results
            frontend/test-results
          if-no-files-found: warn
          retention-days: ${{ inputs.retention-days }}
