name: Tests Nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      run_secret_integrations:
        description: "Run secret-backed notification/source integration smoke"
        required: false
        type: boolean
        default: false
      python_matrix:
        description: "Python matrix scope"
        required: false
        type: choice
        default: default
        options:
          - default
          - single
      node_matrix:
        description: "Node matrix scope"
        required: false
        type: choice
        default: default
        options:
          - default
          - single
      integration_target:
        description: "Secret integration target"
        required: false
        type: choice
        default: all
        options:
          - notifications
          - sources
          - all

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref || github.sha }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend-py${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ github.event_name == 'workflow_dispatch' && inputs.python_matrix == 'single' && fromJson('["3.12"]') || fromJson('["3.11","3.12","3.13"]') }}
    uses: ./.github/workflows/_backend-checks.yml
    with:
      python-version: ${{ matrix.python-version }}
      retention-days: 30
      upload-coverage: ${{ matrix.python-version == '3.11' }}

  frontend:
    name: frontend-node${{ matrix.node-version }}
    strategy:
      fail-fast: false
      matrix:
        node-version: ${{ github.event_name == 'workflow_dispatch' && inputs.node_matrix == 'single' && fromJson('["20"]') || fromJson('["20","22"]') }}
    uses: ./.github/workflows/_frontend-checks.yml
    with:
      node-version: ${{ matrix.node-version }}
      retention-days: 30

  docs:
    name: docs
    uses: ./.github/workflows/_docs-checks.yml
    with:
      retention-days: 30

  backend-ratchet:
    name: backend-ratchet
    uses: ./.github/workflows/_backend-ratchet.yml
    with:
      python-version: "3.11"
      retention-days: 30

  frontend-ratchet:
    name: frontend-ratchet
    uses: ./.github/workflows/_frontend-ratchet.yml
    with:
      node-version: "20"
      retention-days: 30

  preview-build:
    name: preview-build
    uses: ./.github/workflows/_preview-build.yml
    with:
      python-version: "3.11"
      node-version: "20"
      retention-days: 30

  backend-advisory-quality:
    name: backend-advisory-quality
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install advisory tooling
        run: python -m pip install -e ".[dev]"

      - name: Run ruff
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results
          python -m ruff check src tests 2>&1 | tee test-results/ruff.log

      - name: Run mypy
        shell: bash
        run: |
          set -euo pipefail
          python -m mypy src 2>&1 | tee test-results/mypy.log

      - name: Upload backend advisory artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: nightly-backend-advisory-results
          path: test-results
          if-no-files-found: error
          retention-days: 30

  frontend-advisory-quality:
    name: frontend-advisory-quality
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --no-audit --no-fund

      - name: Run frontend lint
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results
          npm run lint 2>&1 | tee test-results/eslint.log

      - name: Upload frontend advisory artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: nightly-frontend-advisory-results
          path: frontend/test-results
          if-no-files-found: error
          retention-days: 30

  security-audit:
    name: security-audit
    continue-on-error: true
    uses: ./.github/workflows/_security-checks.yml
    with:
      mode: audit
      retention-days: 30

  secret-integrations:
    name: secret-integrations
    if: github.event_name == 'schedule' || inputs.run_secret_integrations
    environment: ci-secrets
    uses: ./.github/workflows/_secret-integrations.yml
    with:
      retention-days: 30
      integration-target: ${{ github.event_name == 'workflow_dispatch' && inputs.integration_target || 'all' }}
