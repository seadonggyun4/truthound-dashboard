site_name: Truthound Dashboard
site_description: Truthound 3.0 operational dashboard
site_url: https://truthound.netlify.app/dashboard/

theme:
  name: material
  custom_dir: docs/overrides
  logo: https://truthound.netlify.app/assets/truthound_icon.png
  favicon: https://truthound.netlify.app/assets/truthound_icon.png
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - content.code.copy

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences

extra_css:
  - assets/stylesheets/banner.css

nav:
  - Overview: index.md
  - Quickstart:
      - Install and Run: quickstart/install-and-run.md
      - Start a Session and Choose a Workspace: quickstart/start-a-session.md
      - Add Your First Source: quickstart/add-your-first-source.md
      - Run Your First Validation: quickstart/run-your-first-validation.md
      - Generate Your First Artifact and Data Docs: quickstart/generate-your-first-artifact.md
      - Triage Your First Incident: quickstart/triage-your-first-incident.md
  - Concepts:
      - Architecture: concepts/architecture.md
      - Core Object Model: concepts/core-object-model.md
      - Workspaces and Sessions: concepts/workspaces-and-sessions.md
      - RBAC and Permissions: concepts/rbac-and-permissions.md
      - Artifact Model: concepts/artifact-model.md
      - Secrets and Credential Rotation: concepts/secrets-and-credential-rotation.md
      - Ownership Model: concepts/ownership-model.md
      - Incident and Queue Model: concepts/incident-and-queue-model.md
  - Guides:
      - Source Onboarding: guides/source-onboarding.md
      - Source Types: guides/source-types.md
      - Source Credentials: guides/source-credentials.md
      - Source Ownership: guides/source-ownership.md
      - Validation Run Model: guides/validation-run-model.md
      - Rule Management: guides/rule-management.md
      - Validation Result Details: guides/validation-result-details.md
      - History and Trends: guides/history-and-trends.md
      - Profiling and Comparison: guides/profiling-and-comparison.md
      - Rule Suggestions: guides/rule-suggestions.md
      - Drift: guides/drift.md
      - Privacy Scan and Mask: guides/privacy-scan-and-mask.md
      - Lineage: guides/lineage.md
      - Schema Evolution: guides/schema-evolution.md
      - Checkpoints and Notifications: guides/checkpoints-and-notifications.md
      - Incident Workbench: guides/incident-workbench.md
      - Reports and Data Docs: guides/reports-and-datadocs.md
      - Plugins: guides/plugins.md
