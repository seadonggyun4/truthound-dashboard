name: Docs

on:
  pull_request:
  push:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.sha || github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    name: docs
    uses: ./.github/workflows/_docs-checks.yml
    with:
      retention-days: 7

  deploy-docs-hook:
    name: deploy-docs-hook
    needs: docs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: docs-deploy
    permissions:
      contents: read
    steps:
      - name: Trigger main docs rebuild
        env:
          NETLIFY_DOCS_BUILD_HOOK: ${{ secrets.NETLIFY_DOCS_BUILD_HOOK }}
        run: |
          if [ -z "${NETLIFY_DOCS_BUILD_HOOK}" ]; then
            echo "NETLIFY_DOCS_BUILD_HOOK is not configured" >&2
            exit 1
          fi
          curl -fsSL -X POST -d '{}' "${NETLIFY_DOCS_BUILD_HOOK}"
