name: Tests PR

on:
  pull_request:
  push:
    branches: [main]
  merge_group:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.sha || github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: preflight
    uses: ./.github/workflows/_security-checks.yml
    with:
      mode: preflight
      retention-days: 7

  backend-py311:
    name: backend-py311
    uses: ./.github/workflows/_backend-checks.yml
    with:
      python-version: "3.11"
      retention-days: 7
      upload-coverage: true

  backend-py312:
    name: backend-py312
    uses: ./.github/workflows/_backend-checks.yml
    with:
      python-version: "3.12"
      retention-days: 7
      upload-coverage: false

  backend-ratchet:
    name: backend-ratchet
    uses: ./.github/workflows/_backend-ratchet.yml
    with:
      python-version: "3.11"
      retention-days: 7

  frontend-node20:
    name: frontend-node20
    uses: ./.github/workflows/_frontend-checks.yml
    with:
      node-version: "20"
      retention-days: 7

  frontend-ratchet:
    name: frontend-ratchet
    uses: ./.github/workflows/_frontend-ratchet.yml
    with:
      node-version: "20"
      retention-days: 7

  preview-build:
    name: preview-build
    uses: ./.github/workflows/_preview-build.yml
    with:
      python-version: "3.11"
      node-version: "20"
      retention-days: 7

  docs:
    name: docs
    uses: ./.github/workflows/_docs-checks.yml
    with:
      retention-days: 7

  summary:
    name: summary
    if: always()
    needs:
      - preflight
      - backend-py311
      - backend-py312
      - backend-ratchet
      - frontend-node20
      - frontend-ratchet
      - preview-build
      - docs
    runs-on: ubuntu-latest
    env:
      PREFLIGHT_RESULT: ${{ needs.preflight.result }}
      BACKEND_PY311_RESULT: ${{ needs.backend-py311.result }}
      BACKEND_PY312_RESULT: ${{ needs.backend-py312.result }}
      BACKEND_RATCHET_RESULT: ${{ needs.backend-ratchet.result }}
      FRONTEND_NODE20_RESULT: ${{ needs.frontend-node20.result }}
      FRONTEND_RATCHET_RESULT: ${{ needs.frontend-ratchet.result }}
      PREVIEW_BUILD_RESULT: ${{ needs.preview-build.result }}
      DOCS_RESULT: ${{ needs.docs.result }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install summary dependencies
        run: python -m pip install -e ".[docs,dev]"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Download workflow artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: ci-artifacts

      - name: Write workflow summary
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          import subprocess
          import xml.etree.ElementTree as ET
          from pathlib import Path

          root = Path("ci-artifacts")
          test_count = 0
          for junit_path in root.rglob("*.xml"):
              try:
                  xml_root = ET.parse(junit_path).getroot()
              except ET.ParseError:
                  continue
              if "tests" in xml_root.attrib:
                  test_count += int(xml_root.attrib.get("tests", 0))

          docs_page_count = len(list(Path("docs").rglob("*.md")))
          artifact_names = sorted(path.name for path in root.iterdir() if path.is_dir())

          ruff = subprocess.run(
              ["python", "-m", "ruff", "check", "src", "tests", "--exit-zero"],
              capture_output=True,
              text=True,
              check=False,
          )
          ruff_count = sum(
              1
              for line in ruff.stdout.splitlines()
              if line.strip() and line.startswith(("src/", "tests/"))
          )

          mypy = subprocess.run(
              ["python", "-m", "mypy", "src", "--hide-error-context", "--no-color-output"],
              capture_output=True,
              text=True,
              check=False,
          )
          mypy_count = sum(1 for line in mypy.stdout.splitlines() if ": error:" in line)

          eslint = subprocess.run(
              ["npm", "run", "lint", "--", "--format", "json"],
              cwd="frontend",
              capture_output=True,
              text=True,
              check=False,
          )
          eslint_errors = eslint_warnings = 0
          if eslint.stdout.strip():
              try:
                  reports = json.loads(eslint.stdout)
              except json.JSONDecodeError:
                  reports = []
              eslint_errors = sum(item.get("errorCount", 0) for item in reports)
              eslint_warnings = sum(item.get("warningCount", 0) for item in reports)

          summary_lines = [
              "## CI Run Summary",
              f"- preflight: `{__import__('os').environ['PREFLIGHT_RESULT']}`",
              f"- backend-py311: `{__import__('os').environ['BACKEND_PY311_RESULT']}`",
              f"- backend-py312: `{__import__('os').environ['BACKEND_PY312_RESULT']}`",
              f"- backend-ratchet: `{__import__('os').environ['BACKEND_RATCHET_RESULT']}`",
              f"- frontend-node20: `{__import__('os').environ['FRONTEND_NODE20_RESULT']}`",
              f"- frontend-ratchet: `{__import__('os').environ['FRONTEND_RATCHET_RESULT']}`",
              f"- preview-build: `{__import__('os').environ['PREVIEW_BUILD_RESULT']}`",
              f"- docs: `{__import__('os').environ['DOCS_RESULT']}`",
              f"- Total collected JUnit tests: `{test_count}`",
              f"- Docs page count: `{docs_page_count}`",
              f"- Uploaded workflow artifacts: {', '.join(f'`{name}`' for name in artifact_names) if artifact_names else 'none'}",
              "- Artifact generation summary: backend JUnit/coverage, frontend smoke logs, docs logs, and preflight logs uploaded for debugging",
              f"- Advisory debt counts: `ruff={ruff_count}`, `mypy={mypy_count}`, `eslint_errors={eslint_errors}`, `eslint_warnings={eslint_warnings}`",
          ]

          Path(__import__("os").environ["GITHUB_STEP_SUMMARY"]).write_text(
              "\n".join(summary_lines) + "\n",
              encoding="utf-8",
          )
          PY
