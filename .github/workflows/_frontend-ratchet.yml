name: Reusable Frontend Ratchet

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
        default: "20"
      retention-days:
        required: false
        type: number
        default: 7

permissions: read-all

jobs:
  frontend-ratchet:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --no-audit --no-fund

      - name: Run frontend eslint ratchet
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results
          mapfile -t targets < <(grep -vE '^\s*(#|$)' ../.github/ci/frontend-eslint-ratchet.txt)
          ./node_modules/.bin/eslint "${targets[@]}" --ext ts,tsx --format unix --max-warnings 0 2>&1 | tee test-results/frontend-ratchet-eslint.log

      - name: Upload frontend ratchet artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: frontend-ratchet-results
          path: frontend/test-results
          if-no-files-found: error
          retention-days: ${{ inputs.retention-days }}

      - name: Write frontend ratchet summary
        if: always()
        shell: bash
        env:
          NODE_VERSION: ${{ inputs.node-version }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          targets = [
              line.strip()
              for line in Path("../.github/ci/frontend-eslint-ratchet.txt").read_text(encoding="utf-8").splitlines()
              if line.strip() and not line.lstrip().startswith("#")
          ]

          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          with summary.open("a", encoding="utf-8") as handle:
              handle.write("### Frontend Ratchet Summary\n")
              handle.write(f"- Node: `{os.environ['NODE_VERSION']}`\n")
              handle.write(f"- ESLint target count: `{len(targets)}`\n")
              handle.write("- Ratchet intent: required clean subtree for artifact-facing pages and API hooks\n")
          PY
