name: Reusable Backend Checks

on:
  workflow_call:
    inputs:
      python-version:
        required: true
        type: string
      retention-days:
        required: false
        type: number
        default: 7
      upload-coverage:
        required: false
        type: boolean
        default: false

permissions: read-all

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Install backend dependencies
        run: python -m pip install -e ".[docs,dev]"

      - name: Run backend test suite
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results
          if [[ "${{ inputs.upload-coverage }}" == "true" ]]; then
            python -m pytest -q tests -p no:cacheprovider \
              --junitxml=test-results/pytest-junit.xml \
              --cov=src/truthound_dashboard \
              --cov-report=xml:test-results/coverage.xml
          else
            python -m pytest -q tests -p no:cacheprovider \
              --junitxml=test-results/pytest-junit.xml
          fi

      - name: Upload backend test artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: backend-py${{ inputs.python-version }}-results
          path: test-results
          if-no-files-found: error
          retention-days: ${{ inputs.retention-days }}

      - name: Write backend summary
        if: always()
        shell: bash
        env:
          PYTHON_VERSION: ${{ inputs.python-version }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          import xml.etree.ElementTree as ET

          junit_path = Path("test-results/pytest-junit.xml")
          tests = failures = errors = skipped = 0
          if junit_path.exists():
              root = ET.parse(junit_path).getroot()
              tests = int(root.attrib.get("tests", 0))
              failures = int(root.attrib.get("failures", 0))
              errors = int(root.attrib.get("errors", 0))
              skipped = int(root.attrib.get("skipped", 0))

          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          with summary.open("a", encoding="utf-8") as handle:
              handle.write("### Backend Check Summary\n")
              handle.write(f"- Python: `{os.environ['PYTHON_VERSION']}`\n")
              handle.write(f"- Tests: `{tests}`\n")
              handle.write(f"- Failures: `{failures}`\n")
              handle.write(f"- Errors: `{errors}`\n")
              handle.write(f"- Skipped: `{skipped}`\n")
              handle.write(f"- Coverage XML: `{'present' if Path('test-results/coverage.xml').exists() else 'not generated'}`\n")
          PY
