name: Reusable Docs Checks

on:
  workflow_call:
    inputs:
      retention-days:
        required: false
        type: number
        default: 7

permissions: read-all

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip

      - name: Install docs dependencies
        run: python -m pip install -e ".[docs,dev]"

      - name: Run docs regression and link checks
        run: |
          mkdir -p test-results
          python -m pytest -q tests/test_docs_surface.py -p no:cacheprovider \
            --junitxml=test-results/docs-junit.xml

      - name: Run docs enforcement gates
        run: python -m pytest -q tests/test_enforcement_gates.py -k no_legacy_surface_gate -p no:cacheprovider

      - name: Build docs strictly
        shell: bash
        run: |
          set -euo pipefail
          python -m mkdocs build --strict 2>&1 | tee test-results/mkdocs.log

      - name: Upload docs artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: docs-results
          path: test-results
          if-no-files-found: error
          retention-days: ${{ inputs.retention-days }}

      - name: Write docs summary
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          import xml.etree.ElementTree as ET

          junit_path = Path("test-results/docs-junit.xml")
          tests = failures = 0
          if junit_path.exists():
              root = ET.parse(junit_path).getroot()
              tests = int(root.attrib.get("tests", 0))
              failures = int(root.attrib.get("failures", 0))
          page_count = len(list(Path("docs").rglob("*.md")))

          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          with summary.open("a", encoding="utf-8") as handle:
              handle.write("### Docs Check Summary\n")
              handle.write(f"- Docs tests: `{tests}`\n")
              handle.write(f"- Failures: `{failures}`\n")
              handle.write(f"- Markdown pages: `{page_count}`\n")
              handle.write("- Canonical reporting REST surface: `/artifacts`\n")
          PY
