name: Tests PR

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: dashboard-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: python -m pip install -e ".[dev]"
      - name: Static regression gates
        run: python -m pytest -q tests/test_backend_surface.py tests/test_frontend_surface.py tests/test_docs_surface.py -p no:cacheprovider
      - name: No legacy surface gate
        run: python -m pytest -q tests/test_enforcement_gates.py -k no_legacy_surface_gate -p no:cacheprovider
      - name: No monolith services gate
        run: python -m pytest -q tests/test_enforcement_gates.py -k no_monolith_services_gate -p no:cacheprovider
      - name: No secret leak gate
        run: python -m pytest -q tests/test_enforcement_gates.py -k no_secret_leak_gate -p no:cacheprovider
      - name: Migration smoke gate
        run: python -m pytest -q tests/test_enforcement_gates.py -k migration_smoke_gate -p no:cacheprovider
      - name: Control-plane hardening tests
        run: python -m pytest -q tests/test_control_plane_hardening.py -p no:cacheprovider
      - name: Canonical E2E gate
        run: python -m pytest -q tests/test_enforcement_gates.py -k canonical_e2e_gate -p no:cacheprovider
      - name: Full backend test suite
        run: python -m pytest -q tests -p no:cacheprovider

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Frontend smoke and type gates
        run: npm run type-check
      - name: Build
        run: npm run build
